<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sayfa Bulunamadı - YKS Günlüğüm</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --warm-dark: #3d3228; --warm-brown: #7d5a3f; --warm-cream: #e6d4b8; --warm-light: #f5ede0; --warm-orange: #d97449; --warm-peach: #e8a87c; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--warm-light), var(--warm-cream)); min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(61, 50, 40, 0.95); padding: 1rem 2rem; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--warm-peach); cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .logo::before { content: "📚"; font-size: 1.8rem; }
        .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .card { background: white; padding: 3rem 2.5rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        .error-code { font-size: 6rem; font-weight: bold; color: var(--warm-orange); line-height: 1; margin-bottom: 0.5rem; }
        .error-icon { font-size: 3rem; margin-bottom: 1rem; }
        .error-title { font-size: 1.6rem; color: var(--warm-dark); font-weight: bold; margin-bottom: 1rem; }
        .error-desc { color: var(--warm-brown); line-height: 1.6; margin-bottom: 2rem; font-size: 1rem; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 0.9rem 2rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--warm-orange); color: white; }
        .btn-primary:hover { background: #c25f35; transform: translateY(-2px); }
        .btn-secondary { background: var(--warm-light); color: var(--warm-dark); border: 2px solid var(--warm-cream); }
        .btn-secondary:hover { background: var(--warm-cream); transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html">YKS Günlüğüm</a>
    </header>
    <div class="content">
        <div class="card">
            <div class="error-code">404</div>
            <div class="error-icon">🔍</div>
            <div class="error-title">Sayfa Bulunamadı</div>
            <div class="error-desc">
                Aradığınız sayfa mevcut değil, taşınmış ya da silinmiş olabilir.<br>
                Endişelenmeyin, YKS çalışmanıza kaldığınız yerden devam edebilirsiniz!
            </div>
            <div class="btn-group">
                <a class="btn btn-primary" href="index.html">🏠 Ana Sayfaya Dön</a>
                <a class="btn btn-secondary" id="dashboardBtn" href="index.html">📊 Dashboard</a>
            </div>
        </div>
    </div>
    <script>
        const cu = localStorage.getItem('currentUser');
        if (cu) {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const me = users.find(u => u.name === cu);
            const dashBtn = document.getElementById('dashboardBtn');
            dashBtn.href = me?.isTeacher ? 'classroom.html' : 'dashboard.html';
        }
    </script>
</body>
</html>
