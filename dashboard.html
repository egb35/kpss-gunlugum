<style>
/* CSS styles for nick modal */
.modal-nick {
  display: none;
  position: fixed;
  z-index: 1;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(255, 223, 186, 0.8); /* Warm background */
  justify-content: center;
  align-items: center;
}

.modal-nick.active {
  display: flex;
}
</style>

<!-- HTML modal for nick change -->
<div id="nickModal" class="modal-nick">
    <div class="modal-content">
        <span onclick="closeNickModal()" class="close">&times;</span>
        <h2>Change Nick</h2>
        <input type="text" id="newNick" placeholder="Enter new nick">
        <button onclick="changeNick()">Save</button>
        <button onclick="closeNickModal()">Cancel</button>
    </div>
</div>

<script>
// JavaScript functions
function openNickModal() {
    document.getElementById('nickModal').classList.add('active');
}

function closeNickModal() {
    document.getElementById('nickModal').classList.remove('active');
}

function changeNick() {
    const lastChangeDate = localStorage.getItem('nickChangeData') ? JSON.parse(localStorage.getItem('nickChangeData')).lastChangeDate : null;
    const today = new Date().toISOString().slice(0, 10);
    if (lastChangeDate === today) {
        alert('You can only change your nick once a day.');
        return;
    }
    const newNick = document.getElementById('newNick').value;
    localStorage.setItem('userInfo.nick', newNick);
    const nickChangeData = { lastChangeDate: today };
    localStorage.setItem('nickChangeData', JSON.stringify(nickChangeData));
    document.getElementById('userNick').innerText = newNick;
    alert('Nick changed successfully!');
    closeNickModal();
}

// Update DOMContentLoaded event to load userInfo from localStorage
document.addEventListener('DOMContentLoaded', function() {
    const userInfo = JSON.parse(localStorage.getItem('userInfo')) || {};
    const userNick = userInfo.nick || 'Guest'; // Default to Guest
    document.getElementById('userNick').innerText = userNick;
    const userNickElement = document.getElementById('userNick');
    userNickElement.onclick = openNickModal;
    userNickElement.style.cursor = 'pointer';
});

// Update avatar initial (assuming you have logic for it)
</script>
